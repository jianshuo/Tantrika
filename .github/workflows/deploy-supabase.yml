name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - 'EdgeFunctions/**'
  workflow_dispatch:
    inputs:
      run_seed:
        description: 'Run seed.sql after migration'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      PROJECT_REF: oxjqrdjywuxkmnsvvsuh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref $PROJECT_REF

      - name: Run database migrations
        run: supabase db push

      - name: Seed demo data (manual trigger only)
        if: ${{ github.event.inputs.run_seed == 'true' }}
        run: supabase db query --file supabase/seed.sql

      - name: Deploy Edge Function
        run: supabase functions deploy sign-video-url --project-ref $PROJECT_REF

      - name: Set Edge Function secrets
        run: |
          supabase secrets set \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            --project-ref $PROJECT_REF
