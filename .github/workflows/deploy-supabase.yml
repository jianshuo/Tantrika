name: Deploy Supabase

on:
  push:
    branches: [main]
    paths:
      - 'supabase/migrations/**'
      - 'supabase/seed.sql'
      - 'EdgeFunctions/**'
  workflow_dispatch:
    inputs:
      run_seed:
        description: 'Run seed.sql after migration'
        required: false
        default: 'false'
        type: boolean

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
      PROJECT_REF: oxjqrdjywuxkmnsvvsuh

    steps:
      - uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref $PROJECT_REF

      - name: Run database migrations
        run: supabase db push

      - name: Seed demo data (manual trigger only)
        if: ${{ github.event.inputs.run_seed == 'true' }}
        run: |
          supabase db execute --file supabase/seed.sql

      - name: Deploy sign-video-url Edge Function
        run: |
          supabase functions deploy sign-video-url \
            --project-ref $PROJECT_REF
        env:
          # Edge Function secrets are set separately via Supabase dashboard
          # or: supabase secrets set CF_ACCOUNT_ID=... CF_STREAM_SIGNING_KEY_ID=... CF_STREAM_SIGNING_SECRET=...
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: Set Edge Function secrets
        run: |
          supabase secrets set \
            CF_ACCOUNT_ID=${{ secrets.CF_ACCOUNT_ID }} \
            CF_STREAM_SIGNING_KEY_ID=${{ secrets.CF_STREAM_SIGNING_KEY_ID }} \
            CF_STREAM_SIGNING_SECRET="${{ secrets.CF_STREAM_SIGNING_SECRET }}" \
            SUPABASE_SERVICE_ROLE_KEY=${{ secrets.SUPABASE_SERVICE_ROLE_KEY }} \
            --project-ref $PROJECT_REF
